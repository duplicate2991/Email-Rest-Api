<!DOCTYPE html>
<html>
<head>
    <title>Email Tester</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: system-ui;
            margin: 0;
            padding: 15px;
            background: #0f172a;
            color: white;
        }

        .container {
            max-width: 500px;
            margin: auto;
        }

        h2 {
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }

        input {
            background: #1e293b;
            color: white;
        }

        button {
            background: #22c55e;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
        }

        .status {
            margin-top: 15px;
            font-weight: bold;
        }

        .logs {
            margin-top: 15px;
            background: black;
            padding: 10px;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 13px;
        }

        .success { color: #22c55e; }
        .error { color: #ef4444; }
        .loading { color: #facc15; }
    </style>
</head>
<body>

<div class="container">
    <h2>📨 Email App Password Tester</h2>

    <input type="email" id="email" placeholder="Enter your Gmail">
    <input type="password" id="password" placeholder="Enter App Password">

    <button id="btn" onclick="sendMail()">Send Test Email</button>

    <div class="status" id="status"></div>

    <div class="logs" id="logs"></div>
</div>

<script>
async function sendMail() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const logsEl = document.getElementById("logs");
    const statusEl = document.getElementById("status");
    const btn = document.getElementById("btn");

    logsEl.innerHTML = "";
    statusEl.innerHTML = "⏳ Processing...";
    statusEl.className = "status loading";

    btn.disabled = true;

    try {
        const res = await fetch("/send", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        logsEl.innerHTML = data.logs.map(l => `<div>> ${l}</div>`).join("");

        if (data.success) {
            statusEl.innerHTML = "✅ Email Sent Successfully";
            statusEl.className = "status success";
        } else {
            statusEl.innerHTML = "❌ Failed to Send Email";
            statusEl.className = "status error";
        }

    } catch (err) {
        statusEl.innerHTML = "❌ Network Error";
        statusEl.className = "status error";
        logsEl.innerHTML += `<div>> ${err.message}</div>`;
    }

    btn.disabled = false;
}
</script>

</body>
</html>
